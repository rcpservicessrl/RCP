# LiteLLM Configuration — RCP IA Privada
# Exposes local Ollama models via OpenAI-compatible API

model_list:
  - model_name: gpt-4
    litellm_params:
      model: ollama/llama3.1:8b
      api_base: http://ollama:11434

  - model_name: gpt-3.5-turbo
    litellm_params:
      model: ollama/mistral:7b
      api_base: http://ollama:11434

  - model_name: codellama
    litellm_params:
      model: ollama/codellama:7b
      api_base: http://ollama:11434

general_settings:
  master_key: sk-rcp-local-dev
  drop_params: true

litellm_settings:
  set_verbose: false
  num_retries: 2
  request_timeout: 120
