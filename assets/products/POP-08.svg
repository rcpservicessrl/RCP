<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Kit Bienvenida Corporativo -->
  <!-- Gift box -->
  <rect x="25" y="40" width="70" height="55" rx="4" stroke="#FCB53F" stroke-width="2.5" fill="rgba(252,181,63,0.06)"/>
  <!-- Ribbon horizontal -->
  <rect x="25" y="60" width="70" height="8" fill="rgba(252,181,63,0.15)"/>
  <!-- Ribbon vertical -->
  <rect x="56" y="40" width="8" height="55" fill="rgba(252,181,63,0.15)"/>
  <!-- Bow -->
  <ellipse cx="52" cy="38" rx="10" ry="7" stroke="#FCB53F" stroke-width="1.5" fill="rgba(252,181,63,0.1)"/>
  <ellipse cx="68" cy="38" rx="10" ry="7" stroke="#FCB53F" stroke-width="1.5" fill="rgba(252,181,63,0.1)"/>
  <circle cx="60" cy="38" r="4" fill="#FCB53F" opacity="0.4"/>
  <!-- Items peeking out -->
  <rect x="30" y="30" width="8" height="12" rx="1" stroke="#FCB53F" stroke-width="1" fill="rgba(252,181,63,0.08)" transform="rotate(-10 34 36)"/>
  <circle cx="88" cy="35" r="5" stroke="#FCB53F" stroke-width="1" fill="rgba(252,181,63,0.08)"/>
  <!-- Stars / sparkles -->
  <text x="18" y="30" font-size="8" fill="#FCB53F" opacity="0.4">✦</text>
  <text x="95" y="50" font-size="6" fill="#FCB53F" opacity="0.3">✦</text>
</svg>