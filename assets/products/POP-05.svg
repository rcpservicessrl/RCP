<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Bolígrafos con Logo -->
  <!-- Pen 1 -->
  <line x1="25" y1="90" x2="85" y2="30" stroke="#FCB53F" stroke-width="3" stroke-linecap="round"/>
  <polygon points="85,30 90,25 87,28" fill="#FCB53F"/>
  <rect x="40" y="56" width="15" height="5" rx="1" fill="rgba(252,181,63,0.2)" transform="rotate(-45 47 58)"/>
  <!-- Pen 2 (behind) -->
  <line x1="35" y1="95" x2="90" y2="40" stroke="#FCB53F" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
  <!-- Pen 3 (behind) -->
  <line x1="18" y1="82" x2="75" y2="25" stroke="#FCB53F" stroke-width="2" stroke-linecap="round" opacity="0.25"/>
  <!-- Logo area on main pen -->
  <rect x="48" y="53" width="12" height="6" rx="1" fill="rgba(252,181,63,0.3)" stroke="#FCB53F" stroke-width="0.8" transform="rotate(-45 54 56)"/>
  <!-- Quantity -->
  <text x="42" y="112" font-family="Montserrat,sans-serif" font-size="9" fill="#FCB53F" opacity="0.6">×100</text>
</svg>