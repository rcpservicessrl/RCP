<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" stroke-linecap="round" stroke-linejoin="round">
  <!-- Pens x100 - Single pen diagonal, "x100" badge -->
  <!-- Pen body -->
  <rect x="96" y="200" width="300" height="32" rx="16" fill="#FAB839" stroke="#1A1B20" stroke-width="8" transform="rotate(-25, 256, 256)"/>
  <!-- Pen clip -->
  <rect x="346" y="164" width="60" height="10" rx="5" fill="#1A1B20" stroke="#1A1B20" stroke-width="4" transform="rotate(-25, 256, 256)"/>
  <!-- Pen tip -->
  <path d="M88 312 L68 328 L100 316 Z" fill="#A87C66" stroke="#1A1B20" stroke-width="6" transform="rotate(-25, 256, 256)"/>
  <!-- Pen grip section -->
  <rect x="96" y="200" width="60" height="32" rx="8" fill="#A87C66" stroke="#1A1B20" stroke-width="6" transform="rotate(-25, 256, 256)"/>
  <!-- Pen top cap -->
  <rect x="360" y="200" width="40" height="32" rx="16" fill="#79C143" stroke="#1A1B20" stroke-width="6" transform="rotate(-25, 256, 256)"/>
  <!-- Logo band -->
  <rect x="220" y="200" width="56" height="32" rx="4" fill="#79C143" stroke="#1A1B20" stroke-width="4" transform="rotate(-25, 256, 256)"/>
  <!-- x100 badge -->
  <circle cx="400" cy="400" r="48" fill="#79C143" stroke="#1A1B20" stroke-width="8"/>
  <text x="400" y="392" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF" stroke="none" text-anchor="middle">x</text>
  <text x="400" y="418" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF" stroke="none" text-anchor="middle">100</text>
</svg>