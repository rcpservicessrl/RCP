<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" stroke-linecap="round" stroke-linejoin="round">
  <!-- Meta Ads Campaign - Phone with "AD" card + target crosshair -->
  <!-- Phone body -->
  <rect x="80" y="64" width="200" height="384" rx="28" fill="#FFFFFF" stroke="#1A1B20" stroke-width="8"/>
  <!-- Phone screen -->
  <rect x="100" y="108" width="160" height="296" rx="8" fill="#FAB839" stroke="#1A1B20" stroke-width="6"/>
  <!-- Phone notch -->
  <rect x="148" y="76" width="64" height="16" rx="8" fill="#1A1B20" stroke="none"/>
  <!-- AD card on screen -->
  <rect x="116" y="140" width="128" height="160" rx="12" fill="#FFFFFF" stroke="#1A1B20" stroke-width="6"/>
  <!-- AD badge -->
  <rect x="124" y="148" width="40" height="20" rx="6" fill="#79C143" stroke="#1A1B20" stroke-width="4"/>
  <text x="144" y="164" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF" stroke="none" text-anchor="middle">AD</text>
  <!-- Ad image area -->
  <rect x="124" y="176" width="112" height="68" rx="8" fill="#FAB839" stroke="#1A1B20" stroke-width="4"/>
  <!-- Ad text -->
  <rect x="124" y="256" width="80" height="10" rx="5" fill="#A87C66" stroke="none"/>
  <rect x="124" y="274" width="100" height="10" rx="5" fill="#A87C66" stroke="none"/>
  <!-- CTA button -->
  <rect x="124" y="336" width="100" height="28" rx="14" fill="#79C143" stroke="#1A1B20" stroke-width="4"/>
  <!-- Target crosshair -->
  <circle cx="380" cy="256" r="72" fill="none" stroke="#1A1B20" stroke-width="8"/>
  <circle cx="380" cy="256" r="48" fill="none" stroke="#1A1B20" stroke-width="6"/>
  <circle cx="380" cy="256" r="24" fill="#79C143" stroke="#1A1B20" stroke-width="6"/>
  <circle cx="380" cy="256" r="8" fill="#1A1B20" stroke="none"/>
  <!-- Crosshair lines -->
  <line x1="380" y1="168" x2="380" y2="200" stroke="#1A1B20" stroke-width="6"/>
  <line x1="380" y1="312" x2="380" y2="344" stroke="#1A1B20" stroke-width="6"/>
  <line x1="292" y1="256" x2="324" y2="256" stroke="#1A1B20" stroke-width="6"/>
  <line x1="436" y1="256" x2="468" y2="256" stroke="#1A1B20" stroke-width="6"/>
</svg>