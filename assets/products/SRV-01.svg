<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Identidad Visual Básica - Logo + Palette -->
  <!-- Canvas/artboard -->
  <rect x="20" y="20" width="80" height="80" rx="6" stroke="#FCB53F" stroke-width="2" fill="rgba(252,181,63,0.04)"/>
  <!-- Logo design (abstract R) -->
  <circle cx="55" cy="50" r="20" stroke="#FCB53F" stroke-width="2.5" fill="rgba(252,181,63,0.08)"/>
  <text x="47" y="58" font-family="Montserrat,sans-serif" font-size="22" font-weight="700" fill="#FCB53F">R</text>
  <!-- Color palette circles -->
  <circle cx="35" cy="85" r="6" fill="#FCB53F" opacity="0.7"/>
  <circle cx="50" cy="85" r="6" fill="#FCB53F" opacity="0.5"/>
  <circle cx="65" cy="85" r="6" fill="#FCB53F" opacity="0.3"/>
  <circle cx="80" cy="85" r="6" stroke="#FCB53F" stroke-width="1.5" fill="rgba(252,181,63,0.1)"/>
  <circle cx="95" cy="85" r="6" stroke="#FCB53F" stroke-width="1.5" fill="rgba(252,181,63,0.05)"/>
  <!-- Typography lines -->
  <rect x="78" y="35" width="15" height="3" rx="1" fill="#FCB53F" opacity="0.4"/>
  <rect x="78" y="42" width="12" height="2" rx="1" fill="#FCB53F" opacity="0.25"/>
  <rect x="78" y="48" width="14" height="2" rx="1" fill="#FCB53F" opacity="0.25"/>
  <!-- Pencil tool indicator -->
  <line x1="90" y1="18" x2="100" y2="8" stroke="#FCB53F" stroke-width="2" stroke-linecap="round"/>
  <polygon points="100,8 102,6 97,7" fill="#FCB53F"/>
</svg>