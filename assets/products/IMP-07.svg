<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Letrero Acrílico Luminoso LED -->
  <rect x="20" y="30" width="80" height="40" rx="5" stroke="#FCB53F" stroke-width="2.5" fill="rgba(252,181,63,0.08)"/>
  <!-- Glow effect -->
  <rect x="20" y="30" width="80" height="40" rx="5" fill="none" stroke="#FCB53F" stroke-width="1" opacity="0.3" filter="url(#glow)"/>
  <!-- Text on sign -->
  <rect x="30" y="42" width="60" height="6" rx="2" fill="#FCB53F" opacity="0.4"/>
  <rect x="40" y="52" width="40" height="4" rx="1" fill="#FCB53F" opacity="0.25"/>
  <!-- LED dots on border -->
  <circle cx="25" cy="35" r="1.5" fill="#FCB53F" opacity="0.7"/>
  <circle cx="25" cy="45" r="1.5" fill="#FCB53F" opacity="0.5"/>
  <circle cx="25" cy="55" r="1.5" fill="#FCB53F" opacity="0.7"/>
  <circle cx="25" cy="65" r="1.5" fill="#FCB53F" opacity="0.5"/>
  <circle cx="95" cy="35" r="1.5" fill="#FCB53F" opacity="0.7"/>
  <circle cx="95" cy="45" r="1.5" fill="#FCB53F" opacity="0.5"/>
  <circle cx="95" cy="55" r="1.5" fill="#FCB53F" opacity="0.7"/>
  <circle cx="95" cy="65" r="1.5" fill="#FCB53F" opacity="0.5"/>
  <!-- Mounting brackets -->
  <line x1="40" y1="70" x2="40" y2="82" stroke="#FCB53F" stroke-width="2.5"/>
  <line x1="80" y1="70" x2="80" y2="82" stroke="#FCB53F" stroke-width="2.5"/>
  <!-- Wall -->
  <rect x="15" y="82" width="90" height="20" rx="0" fill="rgba(252,181,63,0.03)" stroke="#FCB53F" stroke-width="1" opacity="0.3"/>
  <!-- Rays of light -->
  <line x1="30" y1="25" x2="28" y2="18" stroke="#FCB53F" stroke-width="1" opacity="0.3"/>
  <line x1="60" y1="25" x2="60" y2="17" stroke="#FCB53F" stroke-width="1" opacity="0.4"/>
  <line x1="90" y1="25" x2="92" y2="18" stroke="#FCB53F" stroke-width="1" opacity="0.3"/>
</svg>