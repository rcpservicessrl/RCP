<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" stroke-linecap="round" stroke-linejoin="round">
  <!-- Flyers x1000 - Stack of colorful papers, slight rotation, "x1000" badge -->
  <!-- Paper 4 (back) -->
  <rect x="100" y="72" width="280" height="360" rx="12" fill="#A87C66" stroke="#1A1B20" stroke-width="6" transform="rotate(4, 256, 256)"/>
  <!-- Paper 3 -->
  <rect x="100" y="72" width="280" height="360" rx="12" fill="#79C143" stroke="#1A1B20" stroke-width="6" transform="rotate(2, 256, 256)"/>
  <!-- Paper 2 -->
  <rect x="100" y="72" width="280" height="360" rx="12" fill="#FFFFFF" stroke="#1A1B20" stroke-width="6" transform="rotate(-1, 256, 256)"/>
  <!-- Paper 1 (front) -->
  <rect x="100" y="72" width="280" height="360" rx="12" fill="#FAB839" stroke="#1A1B20" stroke-width="8"/>
  <!-- Flyer content -->
  <rect x="136" y="108" width="208" height="80" rx="10" fill="#FFFFFF" stroke="#1A1B20" stroke-width="6"/>
  <rect x="136" y="212" width="160" height="14" rx="7" fill="#1A1B20" stroke="none"/>
  <rect x="136" y="240" width="180" height="12" rx="6" fill="#A87C66" stroke="none"/>
  <rect x="136" y="264" width="140" height="12" rx="6" fill="#A87C66" stroke="none"/>
  <rect x="136" y="320" width="100" height="36" rx="18" fill="#79C143" stroke="#1A1B20" stroke-width="6"/>
  <!-- x1000 badge -->
  <circle cx="400" cy="400" r="44" fill="#79C143" stroke="#1A1B20" stroke-width="8"/>
  <text x="400" y="392" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF" stroke="none" text-anchor="middle">x</text>
  <text x="400" y="416" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF" stroke="none" text-anchor="middle">1000</text>
</svg>