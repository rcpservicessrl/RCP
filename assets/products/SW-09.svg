  <rect x="44" y="38" width="15" height="15" rx="3" fill="rgba(252,181,63,0.15)" stroke="#FCB53F" stroke-width="0.8"/>
  <rect x="62" y="38" width="15" height="15" rx="3" fill="rgba(252,181,63,0.15)" stroke="#FCB53F" stroke-width="0.8"/>
  <rect x="44" y="56" width="15" height="15" rx="3" fill="rgba(252,181,63,0.15)" stroke="#FCB53F" stroke-width="0.8"/>
  <rect x="62" y="56" width="15" height="15" rx="3" fill="rgba(252,181,63,0.15)" stroke="#FCB53F" stroke-width="0.8"/>
  <!-- Tab bar -->
