<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Rebranding Corporativo - Brand refresh -->
  <!-- Before (faded) -->
  <circle cx="38" cy="45" r="15" stroke="#FCB53F" stroke-width="1.5" fill="rgba(252,181,63,0.04)" opacity="0.4"/>
  <text x="33" y="49" font-size="10" fill="#FCB53F" opacity="0.3">old</text>
  <!-- Arrow transformation -->
  <path d="M55 45 C62 40 68 40 75 45" stroke="#FCB53F" stroke-width="2" fill="none"/>
  <polygon points="75,45 72,40 72,50" fill="#FCB53F" opacity="0.7"/>
  <!-- After (vibrant) -->
  <circle cx="88" cy="45" r="15" stroke="#FCB53F" stroke-width="2.5" fill="rgba(252,181,63,0.12)"/>
  <text x="82" y="49" font-size="10" fill="#FCB53F" font-weight="bold">R</text>
  <!-- Brand manual pages -->
  <rect x="25" y="68" width="70" height="35" rx="4" stroke="#FCB53F" stroke-width="2" fill="rgba(252,181,63,0.06)"/>
  <rect x="25" y="68" width="70" height="8" rx="4" fill="rgba(252,181,63,0.1)"/>
  <rect x="25" y="72" width="70" height="4" fill="rgba(252,181,63,0.1)"/>
  <!-- Content in manual -->
  <rect x="30" y="80" width="20" height="15" rx="2" fill="rgba(252,181,63,0.1)"/>
  <rect x="55" y="80" width="15" height="3" rx="1" fill="#FCB53F" opacity="0.25"/>
  <rect x="55" y="86" width="30" height="2" rx="1" fill="#FCB53F" opacity="0.15"/>
  <rect x="55" y="91" width="25" height="2" rx="1" fill="#FCB53F" opacity="0.15"/>
  <!-- Sparkle -->
  <text x="98" y="35" font-size="10" fill="#FCB53F" opacity="0.5">✦</text>
</svg>