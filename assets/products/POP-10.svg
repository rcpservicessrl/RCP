  <line x1="30" y1="55" x2="18" y2="60" stroke="#FCB53F" stroke-width="2" stroke-linecap="round"/>
  <line x1="90" y1="55" x2="102" y2="60" stroke="#FCB53F" stroke-width="2" stroke-linecap="round"/>
  <!-- Pocket -->
  <rect x="42" y="65" width="36" height="22" rx="3" stroke="#FCB53F" stroke-width="1.5" fill="rgba(252,181,63,0.08)"/>
  <!-- Embroidered logo on chest -->
  <rect x="50" y="38" width="20" height="14" rx="2" stroke="#FCB53F" stroke-width="1.2" fill="rgba(252,181,63,0.12)"/>
  <text x="54" y="48" font-size="8" fill="#FCB53F" font-weight="bold">RCP</text>
