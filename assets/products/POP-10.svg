<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Delantal Bordado -->
  <!-- Apron body -->
  <path d="M35 30 L30 35 L30 100 L90 100 L90 35 L85 30 Z" stroke="#FCB53F" stroke-width="2.5" fill="rgba(252,181,63,0.06)"/>
  <!-- Neck strap -->
  <path d="M35 30 C35 15 60 10 60 10 C60 10 85 15 85 30" stroke="#FCB53F" stroke-width="2" fill="none"/>
