  <ellipse cx="50" cy="88" rx="12" ry="8" stroke="#FCB53F" stroke-width="1" fill="rgba(252,181,63,0.04)"/>
  <ellipse cx="72" cy="88" rx="10" ry="7" stroke="#FCB53F" stroke-width="1" fill="rgba(252,181,63,0.04)"/>
  <!-- Upload arrow -->
  <line x1="60" y1="95" x2="60" y2="105" stroke="#FCB53F" stroke-width="2" stroke-linecap="round"/>
  <polyline points="55,100 60,95 65,100" stroke="#FCB53F" stroke-width="2" stroke-linecap="round" fill="none"/>
