  <rect x="44" y="95" width="7" height="7" rx="1" fill="#FCB53F" opacity="0.35"/>
  <rect x="54" y="95" width="7" height="7" rx="1" fill="#FCB53F" opacity="0.25"/>
  <rect x="64" y="95" width="7" height="7" rx="1" fill="#FCB53F" opacity="0.3"/>
  <rect x="74" y="95" width="7" height="7" rx="1" fill="#FCB53F" opacity="0.2"/>
