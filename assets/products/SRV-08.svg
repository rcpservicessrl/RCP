  <rect x="55" y="35" width="20" height="20" rx="2" fill="rgba(252,181,63,0.1)" stroke="#FCB53F" stroke-width="1"/>
  <rect x="32" y="58" width="20" height="20" rx="2" fill="rgba(252,181,63,0.1)" stroke="#FCB53F" stroke-width="1"/>
  <rect x="55" y="58" width="20" height="20" rx="2" fill="rgba(252,181,63,0.12)" stroke="#FCB53F" stroke-width="1"/>
  <!-- Profile header -->
