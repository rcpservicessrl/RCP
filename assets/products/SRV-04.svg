<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Auditoría Fiscal + Plan Tributario -->
  <!-- Magnifying glass -->
  <circle cx="50" cy="50" r="22" stroke="#FCB53F" stroke-width="2.5" fill="rgba(252,181,63,0.06)"/>
  <line x1="65" y1="65" x2="85" y2="85" stroke="#FCB53F" stroke-width="4" stroke-linecap="round"/>
  <!-- Document inside magnifier -->
  <rect x="38" y="38" width="20" height="22" rx="2" stroke="#FCB53F" stroke-width="1.2" fill="rgba(252,181,63,0.08)"/>
  <rect x="41" y="42" width="14" height="2" rx="1" fill="#FCB53F" opacity="0.3"/>
  <rect x="41" y="47" width="10" height="2" rx="1" fill="#FCB53F" opacity="0.2"/>
  <rect x="41" y="52" width="12" height="2" rx="1" fill="#FCB53F" opacity="0.2"/>
  <!-- Calculator -->
  <rect x="72" y="22" width="28" height="35" rx="3" stroke="#FCB53F" stroke-width="1.8" fill="rgba(252,181,63,0.06)"/>
  <rect x="75" y="26" width="22" height="8" rx="2" fill="rgba(252,181,63,0.15)"/>
  <!-- Calculator buttons -->
  <circle cx="79" cy="40" r="2" fill="#FCB53F" opacity="0.3"/>
  <circle cx="86" cy="40" r="2" fill="#FCB53F" opacity="0.3"/>
  <circle cx="93" cy="40" r="2" fill="#FCB53F" opacity="0.3"/>
  <circle cx="79" cy="48" r="2" fill="#FCB53F" opacity="0.3"/>
  <circle cx="86" cy="48" r="2" fill="#FCB53F" opacity="0.3"/>
  <circle cx="93" cy="48" r="2" fill="#FCB53F" opacity="0.3"/>
  <!-- Warning badge -->
  <polygon points="45,85 55,85 50,75" stroke="#FCB53F" stroke-width="1.5" fill="rgba(252,181,63,0.12)"/>
  <text x="48" y="83" font-size="6" fill="#FCB53F" font-weight="bold">!</text>
  <!-- Trend line -->
  <polyline points="60,100 70,95 80,97 90,90 100,92" stroke="#FCB53F" stroke-width="1.5" fill="none" stroke-linecap="round"/>
</svg>