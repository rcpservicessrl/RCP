<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Campaña Meta Ads -->
  <!-- Phone with ad -->
  <rect x="35" y="15" width="50" height="90" rx="8" stroke="#FCB53F" stroke-width="2.5" fill="rgba(252,181,63,0.06)"/>
  <rect x="40" y="25" width="40" height="65" rx="2" fill="rgba(252,181,63,0.04)" stroke="#FCB53F" stroke-width="0.8"/>
  <!-- Ad content -->
  <rect x="43" y="30" width="34" height="22" rx="2" fill="rgba(252,181,63,0.12)" stroke="#FCB53F" stroke-width="1"/>
  <text x="52" y="44" font-size="8" fill="#FCB53F" font-weight="bold">AD</text>
  <!-- Engagement metrics -->
  <rect x="43" y="56" width="20" height="3" rx="1" fill="#FCB53F" opacity="0.3"/>
  <rect x="43" y="62" width="30" height="2" rx="1" fill="#FCB53F" opacity="0.2"/>
  <!-- CTA button -->
  <rect x="43" y="68" width="22" height="6" rx="3" fill="rgba(252,181,63,0.25)" stroke="#FCB53F" stroke-width="1"/>
  <!-- Impressions burst -->
  <circle cx="92" cy="30" r="12" stroke="#FCB53F" stroke-width="1.5" fill="rgba(252,181,63,0.08)"/>
  <text x="86" y="34" font-size="7" fill="#FCB53F">10K</text>
  <!-- Target icon -->
  <circle cx="20" cy="60" r="10" stroke="#FCB53F" stroke-width="1.5" fill="none"/>
  <circle cx="20" cy="60" r="6" stroke="#FCB53F" stroke-width="1" fill="none" opacity="0.6"/>
  <circle cx="20" cy="60" r="2" fill="#FCB53F" opacity="0.7"/>
  <!-- Graph trending up -->
  <polyline points="43,82 52,78 60,80 68,75 76,72" stroke="#22c55e" stroke-width="1.5" fill="none" stroke-linecap="round"/>
</svg>