<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- POS System -->
  <rect x="20" y="25" width="80" height="55" rx="6" stroke="#FCB53F" stroke-width="2.5" fill="rgba(252,181,63,0.08)"/>
  <rect x="30" y="35" width="50" height="30" rx="3" stroke="#FCB53F" stroke-width="1.5" fill="rgba(252,181,63,0.05)"/>
  <line x1="30" y1="55" x2="80" y2="55" stroke="#FCB53F" stroke-width="1" opacity="0.5"/>
  <rect x="35" y="38" width="20" height="8" rx="2" fill="#FCB53F" opacity="0.3"/>
  <rect x="35" y="58" width="12" height="5" rx="1" fill="#FCB53F" opacity="0.4"/>
  <rect x="50" y="58" width="12" height="5" rx="1" fill="#FCB53F" opacity="0.4"/>
  <rect x="65" y="58" width="12" height="5" rx="1" fill="#FCB53F" opacity="0.4"/>
  <!-- Card reader -->
  <rect x="82" y="35" width="12" height="30" rx="3" stroke="#FCB53F" stroke-width="1.5" fill="rgba(252,181,63,0.05)"/>
  <rect x="85" y="40" width="6" height="4" rx="1" fill="#FCB53F" opacity="0.5"/>
  <!-- Base -->
  <rect x="40" y="80" width="40" height="8" rx="4" stroke="#FCB53F" stroke-width="1.5" fill="rgba(252,181,63,0.05)"/>
  <line x1="60" y1="80" x2="60" y2="75" stroke="#FCB53F" stroke-width="2"/>
  <!-- Dollar sign -->
  <text x="90" y="95" font-family="Montserrat,sans-serif" font-size="14" font-weight="700" fill="#FCB53F">$</text>
</svg>