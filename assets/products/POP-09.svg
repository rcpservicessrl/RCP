<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Sellos Corporativos (Húmedo + Seco) -->
  <!-- Wet stamp -->
  <rect x="15" y="50" width="40" height="25" rx="3" stroke="#FCB53F" stroke-width="2" fill="rgba(252,181,63,0.08)"/>
  <rect x="20" y="42" width="30" height="10" rx="3" fill="rgba(252,181,63,0.12)" stroke="#FCB53F" stroke-width="1.5"/>
  <!-- Handle -->
  <rect x="28" y="32" width="14" height="12" rx="3" fill="rgba(252,181,63,0.06)" stroke="#FCB53F" stroke-width="1.5"/>
  <!-- Stamp impression circle -->
  <circle cx="35" cy="90" r="15" stroke="#FCB53F" stroke-width="2" fill="rgba(252,181,63,0.06)"/>
  <circle cx="35" cy="90" r="11" stroke="#FCB53F" stroke-width="1" opacity="0.5"/>
  <text x="29" y="93" font-size="7" fill="#FCB53F" font-weight="bold">RCP</text>
  <!-- Dry/embosser stamp -->
  <rect x="70" y="45" width="35" height="14" rx="3" stroke="#FCB53F" stroke-width="2" fill="rgba(252,181,63,0.08)"/>
  <!-- Lever -->
  <path d="M75 45 L87 25 L98 25 L98 45" stroke="#FCB53F" stroke-width="2" fill="rgba(252,181,63,0.04)"/>
  <circle cx="92" cy="25" r="4" fill="#FCB53F" opacity="0.3"/>
  <!-- Embossed result -->
  <circle cx="87" cy="80" r="12" stroke="#FCB53F" stroke-width="1.5" fill="none" stroke-dasharray="2 1"/>
  <text x="81" y="83" font-size="7" fill="#FCB53F" opacity="0.5">SRL</text>
</svg>