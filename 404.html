<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 — Página no encontrada | RCP Services</title>
    <link rel="icon" type="image/png" href="icono-rcp.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: #282829;
            color: #f0f0f5;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 24px;
        }

        .container {
            max-width: 520px;
        }

        .code {
            font-size: 6rem;
            font-weight: 800;
            color: #FCB53F;
            line-height: 1;
        }

        .msg {
            font-size: 1.2rem;
            margin: 16px 0 32px;
            color: rgba(240, 240, 245, 0.7);
        }

        .btn {
            display: inline-block;
            padding: 14px 36px;
            background: #FCB53F;
            color: #282829;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1rem;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(252, 181, 63, 0.3);
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="code">404</div>
        <p class="msg">Esta página no existe o ha sido movida.<br>Volvamos al inicio para reanimarte.</p>
        <a href="index.html" class="btn">← Volver al Inicio</a>
    </div>
</body>

</html>
