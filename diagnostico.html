<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Diagnóstico 360° — RCP Services</title>
  <meta name="description" content="Evalúa la salud de tu empresa en 2 minutos. Score de arritmia empresarial gratuito."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="icon" type="image/png" href="icono-rcp.png"/>
  <link rel="manifest" href="manifest.json"/>
  <style>
    :root{--black:#0c0c0d;--black-2:#151517;--accent:#FCB53F;--accent-dark:#e59e2b;--text:#eaeaea;--text-muted:#8e8f94;--card-bg:rgba(21,21,23,0.7);--card-border:rgba(252,181,63,0.15);--radius:16px;--font:'Montserrat',sans-serif}
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--black);color:var(--text);font-family:var(--font);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .diag-container{max-width:680px;width:100%}
    .diag-header{text-align:center;margin-bottom:40px}
    .diag-header h1{font-size:2rem;font-weight:900;margin-bottom:8px}
    .diag-header h1 span{color:var(--accent)}
    .diag-header p{color:var(--text-muted);font-size:0.9rem}
    .diag-progress{display:flex;gap:4px;margin-bottom:30px}
    .diag-progress .step{flex:1;height:4px;border-radius:2px;background:rgba(255,255,255,0.06);transition:all 0.4s ease}
    .diag-progress .step.done{background:var(--accent)}
    .diag-progress .step.active{background:var(--accent);opacity:0.6;animation:pulse 1.5s infinite}
    @keyframes pulse{0%,100%{opacity:0.6}50%{opacity:1}}
    .diag-card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:var(--radius);padding:40px;backdrop-filter:blur(12px)}
    .question-title{font-size:1.1rem;font-weight:700;margin-bottom:20px;line-height:1.4}
    .options{display:flex;flex-direction:column;gap:12px}
    .option-btn{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:16px 20px;color:var(--text);font-family:var(--font);font-size:0.9rem;font-weight:500;cursor:pointer;transition:all 0.3s ease;text-align:left}
    .option-btn:hover{border-color:var(--accent);background:rgba(252,181,63,0.05);transform:translateX(4px)}
    .option-btn.selected{border-color:var(--accent);background:rgba(252,181,63,0.1);box-shadow:0 0 0 2px rgba(252,181,63,0.2)}
    .diag-nav{display:flex;justify-content:space-between;margin-top:24px}
    .btn-back{background:none;border:1px solid rgba(255,255,255,0.1);color:var(--text-muted);padding:10px 20px;border-radius:8px;font-family:var(--font);font-weight:600;cursor:pointer;font-size:0.85rem;transition:all 0.3s ease}
    .btn-back:hover{border-color:var(--text);color:var(--text)}
    .btn-next{background:var(--accent);border:none;color:#000;padding:10px 24px;border-radius:8px;font-family:var(--font);font-weight:700;cursor:pointer;font-size:0.85rem;transition:all 0.3s ease}
    .btn-next:hover{background:var(--accent-dark);transform:translateY(-1px)}
    .btn-next:disabled{opacity:0.4;cursor:not-allowed;transform:none}
    .result-card{text-align:center;padding:40px}
    .score-circle{width:140px;height:140px;border-radius:50%;border:6px solid var(--accent);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;position:relative}
    .score-circle .score-num{font-size:2.5rem;font-weight:900;color:var(--accent)}
    .score-circle .score-label{position:absolute;bottom:-8px;background:var(--card-bg);padding:2px 10px;border-radius:10px;font-size:0.7rem;color:var(--accent);font-weight:700;border:1px solid var(--accent)}
    .risk-level{font-size:1.3rem;font-weight:800;margin-bottom:8px}
    .risk-desc{color:var(--text-muted);font-size:0.9rem;margin-bottom:24px;line-height:1.6}
    .money-lost{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);border-radius:12px;padding:16px;margin-bottom:24px}
    .money-lost .amount{font-size:1.5rem;font-weight:900;color:#ef4444}
    .money-lost .label{font-size:0.8rem;color:var(--text-muted)}
    .btn-cta-diag{display:inline-flex;align-items:center;gap:8px;background:var(--accent);color:#000;padding:14px 28px;border-radius:10px;font-weight:700;font-size:0.95rem;text-decoration:none;transition:all 0.3s ease}
    .btn-cta-diag:hover{background:var(--accent-dark);transform:translateY(-2px);box-shadow:0 8px 24px rgba(252,181,63,0.2)}
    .hidden{display:none!important}
    @media(max-width:600px){.diag-card{padding:24px} .diag-header h1{font-size:1.5rem}}
  </style>
</head>
<body>
  <div class="diag-container">
    <div class="diag-header">
      <h1>Diagnóstico <span>360°</span></h1>
      <p>Evalúa la salud de tu empresa en 2 minutos. Gratis y confidencial.</p>
    </div>
    <div class="diag-progress" id="progressBar"></div>
    <div class="diag-card" id="questionCard"></div>
  </div>

  <script>
  (function(){
    var questions=[
      {q:"¿Tu empresa está registrada formalmente?",opts:["Sí, tengo RNC, ONAPI y Registro Mercantil","Solo tengo RNC","No estoy registrado en ningún lugar"],scores:[0,3,7]},
      {q:"¿Cómo llevas la contabilidad de tu negocio?",opts:["Con un contador y software","En Excel o cuaderno","No llevo contabilidad formal"],scores:[0,4,8]},
      {q:"¿Cuántos clientes pierdes por mes por no dar seguimiento?",opts:["Ninguno, tengo CRM","Algunos, les escribo manual","No sé, no los registro"],scores:[0,4,8]},
      {q:"¿Tienes presencia digital activa (web + redes)?",opts:["Sí, con estrategia y métricas","Tengo redes pero sin estrategia","No tengo web ni redes activas"],scores:[0,3,7]},
      {q:"¿Cómo cobras a tus clientes?",opts:["Factura electrónica + múltiples métodos","Transferencia o efectivo sin factura","Solo efectivo, sin comprobantes"],scores:[0,4,7]},
      {q:"¿Tienes procesos documentados (SOPs)?",opts:["Sí, todo está escrito","Algunos procesos clave","No, todo está en mi cabeza"],scores:[0,3,6]},
      {q:"¿Cuánto facturas al mes aproximadamente?",opts:["Más de RD$500,000","Entre RD$100,000 y RD$500,000","Menos de RD$100,000"],scores:[0,2,5]},
      {q:"¿Cuál es tu mayor dolor ahora mismo?",opts:["Necesito más clientes","Necesito ordenar mis finanzas","Necesito formalizar mi negocio","Todo lo anterior"],scores:[3,4,5,8]}
    ];
    var current=0,answers=[];
    var card=document.getElementById('questionCard');
    var bar=document.getElementById('progressBar');

    function renderProgress(){
      bar.innerHTML='';
      for(var i=0;i<questions.length;i++){
        var cls=i<current?'step done':i===current?'step active':'step';
        bar.innerHTML+='<div class="'+cls+'"></div>';
      }
    }

    function renderQuestion(){
      var q=questions[current];
      var html='<p class="question-title">'+q.q+'</p><div class="options">';
      q.opts.forEach(function(opt,i){
        var sel=answers[current]===i?' selected':'';
        html+='<button class="option-btn'+sel+'" data-idx="'+i+'">'+opt+'</button>';
      });
      html+='</div><div class="diag-nav">';
      html+=current>0?'<button class="btn-back" id="btnBack">← Anterior</button>':'<div></div>';
      html+='<button class="btn-next" id="btnNext"'+(answers[current]===undefined?' disabled':'')+'>Siguiente →</button>';
      html+='</div>';
      card.innerHTML=html;
      card.querySelectorAll('.option-btn').forEach(function(btn){
        btn.onclick=function(){
          answers[current]=parseInt(btn.getAttribute('data-idx'));
          renderQuestion();
        };
      });
      var next=document.getElementById('btnNext');
      if(next)next.onclick=function(){if(answers[current]!==undefined){current++;if(current>=questions.length)showResult();else{renderProgress();renderQuestion();}}};
      var back=document.getElementById('btnBack');
      if(back)back.onclick=function(){current--;renderProgress();renderQuestion();};
      renderProgress();
    }

    function showResult(){
      var total=0,max=0;
      answers.forEach(function(a,i){total+=questions[i].scores[a];max+=questions[i].scores[questions[i].scores.length-1];});
      var score=Math.round((total/max)*10);
      var risk,desc,color;
      if(score<=3){risk='Bajo';desc='Tu empresa tiene buenos cimientos. Con optimización estratégica puedes escalar al siguiente nivel.';color='#22c55e';}
      else if(score<=6){risk='Moderado';desc='Hay señales de arritmia. Tienes oportunidades claras de mejora en formalización, tecnología o procesos.';color='var(--accent)';}
      else{risk='Crítico';desc='Tu empresa está en arritmia severa. Cada mes que pasa sin actuar, estás perdiendo dinero y oportunidades reales.';color='#ef4444';}
      var monthlyLoss=score*15000+Math.round(Math.random()*20000);

      card.innerHTML='<div class="result-card">'
        +'<div class="score-circle" style="border-color:'+color+'"><span class="score-num" style="color:'+color+'">'+score+'</span><span class="score-label" style="color:'+color+';border-color:'+color+'">/10</span></div>'
        +'<p class="risk-level" style="color:'+color+'">Riesgo '+risk+'</p>'
        +'<p class="risk-desc">'+desc+'</p>'
        +'<div class="money-lost"><p class="label">Estimación de pérdida mensual por ineficiencia:</p><p class="amount">~RD$ '+monthlyLoss.toLocaleString()+'</p></div>'
        +'<a href="https://wa.me/18298068092?text=Hola%20RCP!%20Obtuve%20un%20score%20de%20'+score+'/10%20en%20el%20Diagn%C3%B3stico%20360.%20Quiero%20agendar%20mi%20consultor%C3%ADa%20gratuita." class="btn-cta-diag">🐆 Agendar Diagnóstico Gratuito</a>'
        +'<p style="color:var(--text-muted);font-size:0.75rem;margin-top:16px;">Resultado confidencial. Un consultor te contactará en menos de 24h.</p>'
        +'</div>';
      bar.innerHTML='';for(var i=0;i<questions.length;i++)bar.innerHTML+='<div class="step done"></div>';

      // Send score to backend
      try{
        fetch('https://us-central1-chatbot-rcp.cloudfunctions.net/rcpLead',{
          method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({user_name:'Diagnóstico Web',user_email:'diagnostico@rcp.services',user_service:'Diagnostico 360',user_message:'Score: '+score+'/10 | Riesgo: '+risk+' | Pérdida estimada: RD$'+monthlyLoss})
        });
      }catch(e){}
    }

    renderQuestion();
  })();
  </script>
</body>
</html>
