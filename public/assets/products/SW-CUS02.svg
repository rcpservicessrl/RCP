<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" stroke-linecap="round" stroke-linejoin="round">
  <!-- Mobile App - Phone frame with app grid icons -->
  <!-- Phone body -->
  <rect x="136" y="32" width="240" height="448" rx="36" fill="#FFFFFF" stroke="#1A1B20" stroke-width="8"/>
  <!-- Screen area -->
  <rect x="156" y="80" width="200" height="352" rx="8" fill="#FCB53F" stroke="#1A1B20" stroke-width="6"/>
  <!-- Notch -->
  <rect x="216" y="44" width="80" height="20" rx="10" fill="#1A1B20" stroke="none"/>
  <!-- App grid icons - Row 1 -->
  <rect x="176" y="104" width="48" height="48" rx="12" fill="#79C143" stroke="#1A1B20" stroke-width="6"/>
  <rect x="240" y="104" width="48" height="48" rx="12" fill="#FFFFFF" stroke="#1A1B20" stroke-width="6"/>
  <rect x="304" y="104" width="48" height="48" rx="12" fill="#A87C66" stroke="#1A1B20" stroke-width="6"/>
  <!-- App grid icons - Row 2 -->
  <rect x="176" y="172" width="48" height="48" rx="12" fill="#FFFFFF" stroke="#1A1B20" stroke-width="6"/>
  <rect x="240" y="172" width="48" height="48" rx="12" fill="#79C143" stroke="#1A1B20" stroke-width="6"/>
  <rect x="304" y="172" width="48" height="48" rx="12" fill="#FCB53F" stroke="#1A1B20" stroke-width="6"/>
  <!-- App grid icons - Row 3 -->
  <rect x="176" y="240" width="48" height="48" rx="12" fill="#A87C66" stroke="#1A1B20" stroke-width="6"/>
  <rect x="240" y="240" width="48" height="48" rx="12" fill="#FFFFFF" stroke="#1A1B20" stroke-width="6"/>
  <rect x="304" y="240" width="48" height="48" rx="12" fill="#79C143" stroke="#1A1B20" stroke-width="6"/>
  <!-- App grid icons - Row 4 -->
  <rect x="176" y="308" width="48" height="48" rx="12" fill="#79C143" stroke="#1A1B20" stroke-width="6"/>
  <rect x="240" y="308" width="48" height="48" rx="12" fill="#A87C66" stroke="#1A1B20" stroke-width="6"/>
  <rect x="304" y="308" width="48" height="48" rx="12" fill="#FFFFFF" stroke="#1A1B20" stroke-width="6"/>
  <!-- Home indicator -->
  <rect x="216" y="448" width="80" height="8" rx="4" fill="#1A1B20" stroke="none"/>
</svg>