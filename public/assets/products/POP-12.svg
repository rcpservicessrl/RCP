<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" stroke-linecap="round" stroke-linejoin="round">
  <!-- Embroidered Apron - Apron shape with pocket and logo -->
  <!-- Apron body -->
  <path d="M152 120 L360 120 L380 460 L132 460 Z" fill="#FCB53F" stroke="#1A1B20" stroke-width="8"/>
  <!-- Neck strap -->
  <path d="M200 120 C200 72 256 56 256 56 C256 56 312 72 312 120" fill="none" stroke="#1A1B20" stroke-width="10"/>
  <!-- Waist ties -->
  <path d="M152 260 L80 240 L64 260" fill="none" stroke="#1A1B20" stroke-width="8"/>
  <path d="M360 260 L432 240 L448 260" fill="none" stroke="#1A1B20" stroke-width="8"/>
  <!-- Waist band -->
  <rect x="148" y="248" width="216" height="28" rx="4" fill="#A87C66" stroke="#1A1B20" stroke-width="6"/>
  <!-- Pocket -->
  <rect x="192" y="320" width="128" height="96" rx="12" fill="#FFFFFF" stroke="#1A1B20" stroke-width="6"/>
  <!-- Logo on apron chest -->
  <circle cx="256" cy="184" r="28" fill="#79C143" stroke="#1A1B20" stroke-width="6"/>
  <!-- Embroidery detail on pocket -->
  <rect x="220" y="352" width="72" height="12" rx="6" fill="#79C143" stroke="#1A1B20" stroke-width="4"/>
  <rect x="228" y="376" width="56" height="10" rx="5" fill="#A87C66" stroke="none"/>
</svg>