<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" stroke-linecap="round" stroke-linejoin="round">
  <!-- Custom Packaging - 3D box perspective, logo on front face -->
  <!-- Box top face -->
  <path d="M160 160 L256 112 L392 160 L296 208 Z" fill="#FCB53F" stroke="#000000" stroke-width="8"/>
  <!-- Box front face -->
  <path d="M160 160 L160 360 L296 408 L296 208 Z" fill="#FFFFFF" stroke="#000000" stroke-width="8"/>
  <!-- Box right face -->
  <path d="M296 208 L296 408 L392 360 L392 160 Z" fill="#C48D65" stroke="#000000" stroke-width="8"/>
  <!-- Logo on front face -->
  <circle cx="228" cy="284" r="36" fill="#A6CE39" stroke="#000000" stroke-width="6"/>
  <!-- Brand line on front -->
  <rect x="188" y="336" width="80" height="12" rx="6" fill="#FCB53F" stroke="#000000" stroke-width="4"/>
  <!-- Box tape/seal on top -->
  <line x1="220" y1="140" x2="340" y2="140" stroke="#000000" stroke-width="6"/>
  <!-- RCP signature: compact 2-by-3 gold dot matrix -->
  <g class="rcp-dot-matrix" aria-hidden="true" fill="#FCB53F">
    <circle cx="430" cy="46" r="6"/><circle cx="450" cy="46" r="6"/><circle cx="470" cy="46" r="6"/>
    <circle cx="430" cy="66" r="6"/><circle cx="450" cy="66" r="6"/><circle cx="470" cy="66" r="6"/>
  </g></svg>