<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" stroke-linecap="round" stroke-linejoin="round">
  <!-- Executive Notebook - Closed book with ribbon bookmark -->
  <!-- Book body -->
  <rect x="120" y="56" width="272" height="380" rx="12" fill="#FAB839" stroke="#1A1B20" stroke-width="8"/>
  <!-- Book spine -->
  <rect x="120" y="56" width="28" height="380" rx="12" fill="#A87C66" stroke="#1A1B20" stroke-width="8"/>
  <rect x="134" y="56" width="14" height="380" rx="0" fill="#A87C66" stroke="none"/>
  <!-- Elastic band -->
  <rect x="148" y="56" width="6" height="380" fill="#1A1B20" stroke="none"/>
  <!-- Logo emboss on cover -->
  <circle cx="280" cy="216" r="40" fill="#FFFFFF" stroke="#1A1B20" stroke-width="6"/>
  <!-- Brand name -->
  <rect x="232" y="280" width="96" height="14" rx="7" fill="#FFFFFF" stroke="#1A1B20" stroke-width="4"/>
  <!-- Ribbon bookmark -->
  <path d="M340 56 L340 468 L356 448 L372 468 L372 56" fill="#79C143" stroke="#1A1B20" stroke-width="6"/>
  <!-- Page edges (bottom) -->
  <rect x="148" y="424" width="240" height="12" rx="2" fill="#FFFFFF" stroke="#1A1B20" stroke-width="4"/>
</svg>