<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" stroke-linecap="round" stroke-linejoin="round">
  <!-- Business Cards - Stack of 3 cards slightly rotated -->
  <!-- Card 3 (back, most rotated) -->
  <rect x="96" y="160" width="320" height="192" rx="16" fill="#C48D65" stroke="#000000" stroke-width="8" transform="rotate(-6, 256, 256)"/>
  <!-- Card 2 (middle) -->
  <rect x="96" y="160" width="320" height="192" rx="16" fill="#FFFFFF" stroke="#000000" stroke-width="8" transform="rotate(-2, 256, 256)"/>
  <!-- Card 1 (front) -->
  <rect x="96" y="160" width="320" height="192" rx="16" fill="#FCB53F" stroke="#000000" stroke-width="8"/>
  <!-- Logo circle on front card -->
  <circle cx="176" cy="240" r="32" fill="#A6CE39" stroke="#000000" stroke-width="6"/>
  <!-- Name line -->
  <rect x="232" y="224" width="140" height="14" rx="7" fill="#FFFFFF" stroke="#000000" stroke-width="4"/>
  <!-- Title line -->
  <rect x="232" y="252" width="100" height="10" rx="5" fill="#FFFFFF" stroke="#000000" stroke-width="4"/>
  <!-- Contact lines -->
  <rect x="136" y="300" width="120" height="10" rx="5" fill="#000000" stroke="none"/>
  <rect x="136" y="318" width="160" height="10" rx="5" fill="#000000" stroke="none"/>
  <!-- RCP signature: compact 2-by-3 gold dot matrix -->
  <g class="rcp-dot-matrix" aria-hidden="true" fill="#FCB53F">
    <circle cx="430" cy="46" r="6"/><circle cx="450" cy="46" r="6"/><circle cx="470" cy="46" r="6"/>
    <circle cx="430" cy="66" r="6"/><circle cx="450" cy="66" r="6"/><circle cx="470" cy="66" r="6"/>
  </g></svg>