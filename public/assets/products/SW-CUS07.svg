<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" stroke-linecap="round" stroke-linejoin="round">
  <!-- Browser Window - Corporate Website -->
  <!-- Browser frame -->
  <rect x="56" y="80" width="400" height="352" rx="24" fill="#FFFFFF" stroke="#000000" stroke-width="8"/>
  <!-- Title bar -->
  <rect x="56" y="80" width="400" height="56" rx="24" fill="#FCB53F" stroke="#000000" stroke-width="8"/>
  <rect x="56" y="112" width="400" height="24" rx="0" fill="#FCB53F" stroke="none"/>
  <!-- Nav dots -->
  <circle cx="96" cy="108" r="10" fill="#000000" stroke="#000000" stroke-width="4"/>
  <circle cx="126" cy="108" r="10" fill="#C48D65" stroke="#000000" stroke-width="4"/>
  <circle cx="156" cy="108" r="10" fill="#A6CE39" stroke="#000000" stroke-width="4"/>
  <!-- Address bar -->
  <rect x="190" y="95" width="230" height="26" rx="13" fill="#FFFFFF" stroke="#000000" stroke-width="6"/>
  <!-- Content blocks -->
  <!-- Hero block -->
  <rect x="96" y="168" width="320" height="60" rx="12" fill="#FCB53F" stroke="#000000" stroke-width="6"/>
  <!-- Text lines -->
  <rect x="96" y="252" width="200" height="16" rx="8" fill="#C48D65" stroke="#000000" stroke-width="4"/>
  <rect x="96" y="284" width="280" height="16" rx="8" fill="#C48D65" stroke="#000000" stroke-width="4"/>
  <rect x="96" y="316" width="240" height="16" rx="8" fill="#C48D65" stroke="#000000" stroke-width="4"/>
  <!-- Content cards -->
  <rect x="96" y="356" width="140" height="48" rx="10" fill="#A6CE39" stroke="#000000" stroke-width="6"/>
  <rect x="260" y="356" width="140" height="48" rx="10" fill="#FFFFFF" stroke="#000000" stroke-width="6"/>
  <!-- RCP signature: compact 2-by-3 gold dot matrix -->
  <g class="rcp-dot-matrix" aria-hidden="true" fill="#FCB53F">
    <circle cx="430" cy="46" r="6"/><circle cx="450" cy="46" r="6"/><circle cx="470" cy="46" r="6"/>
    <circle cx="430" cy="66" r="6"/><circle cx="450" cy="66" r="6"/><circle cx="470" cy="66" r="6"/>
  </g></svg>