<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" stroke-linecap="round" stroke-linejoin="round">
  <!-- Thermos Bottle - Tall bottle with cap, laser mark area -->
  <!-- Bottle body -->
  <rect x="176" y="160" width="160" height="304" rx="32" fill="#FAB839" stroke="#1A1B20" stroke-width="8"/>
  <!-- Bottle neck -->
  <rect x="216" y="100" width="80" height="68" rx="12" fill="#A87C66" stroke="#1A1B20" stroke-width="8"/>
  <!-- Cap -->
  <rect x="208" y="48" width="96" height="60" rx="16" fill="#1A1B20" stroke="#1A1B20" stroke-width="8"/>
  <!-- Cap grip lines -->
  <line x1="216" y1="64" x2="216" y2="96" stroke="#A87C66" stroke-width="4"/>
  <line x1="232" y1="64" x2="232" y2="96" stroke="#A87C66" stroke-width="4"/>
  <line x1="248" y1="64" x2="248" y2="96" stroke="#A87C66" stroke-width="4"/>
  <line x1="264" y1="64" x2="264" y2="96" stroke="#A87C66" stroke-width="4"/>
  <line x1="280" y1="64" x2="280" y2="96" stroke="#A87C66" stroke-width="4"/>
  <line x1="296" y1="64" x2="296" y2="96" stroke="#A87C66" stroke-width="4"/>
  <!-- Laser mark area -->
  <rect x="200" y="264" width="112" height="80" rx="12" fill="#FFFFFF" stroke="#1A1B20" stroke-width="6"/>
  <!-- Logo in laser area -->
  <circle cx="256" cy="296" r="20" fill="#79C143" stroke="#1A1B20" stroke-width="4"/>
  <rect x="228" y="324" width="56" height="10" rx="5" fill="#A87C66" stroke="none"/>
  <!-- Bottom base -->
  <rect x="184" y="440" width="144" height="16" rx="8" fill="#A87C66" stroke="#1A1B20" stroke-width="6"/>
</svg>