<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" stroke-linecap="round" stroke-linejoin="round">
  <!-- Thermos Bottle - Tall bottle with cap, laser mark area -->
  <!-- Bottle body -->
  <rect x="176" y="160" width="160" height="304" rx="32" fill="#FCB53F" stroke="#000000" stroke-width="8"/>
  <!-- Bottle neck -->
  <rect x="216" y="100" width="80" height="68" rx="12" fill="#C48D65" stroke="#000000" stroke-width="8"/>
  <!-- Cap -->
  <rect x="208" y="48" width="96" height="60" rx="16" fill="#000000" stroke="#000000" stroke-width="8"/>
  <!-- Cap grip lines -->
  <line x1="216" y1="64" x2="216" y2="96" stroke="#C48D65" stroke-width="4"/>
  <line x1="232" y1="64" x2="232" y2="96" stroke="#C48D65" stroke-width="4"/>
  <line x1="248" y1="64" x2="248" y2="96" stroke="#C48D65" stroke-width="4"/>
  <line x1="264" y1="64" x2="264" y2="96" stroke="#C48D65" stroke-width="4"/>
  <line x1="280" y1="64" x2="280" y2="96" stroke="#C48D65" stroke-width="4"/>
  <line x1="296" y1="64" x2="296" y2="96" stroke="#C48D65" stroke-width="4"/>
  <!-- Laser mark area -->
  <rect x="200" y="264" width="112" height="80" rx="12" fill="#FFFFFF" stroke="#000000" stroke-width="6"/>
  <!-- Logo in laser area -->
  <circle cx="256" cy="296" r="20" fill="#A6CE39" stroke="#000000" stroke-width="4"/>
  <rect x="228" y="324" width="56" height="10" rx="5" fill="#C48D65" stroke="none"/>
  <!-- Bottom base -->
  <rect x="184" y="440" width="144" height="16" rx="8" fill="#C48D65" stroke="#000000" stroke-width="6"/>
  <!-- RCP signature: compact 2-by-3 gold dot matrix -->
  <g class="rcp-dot-matrix" aria-hidden="true" fill="#FCB53F">
    <circle cx="430" cy="46" r="6"/><circle cx="450" cy="46" r="6"/><circle cx="470" cy="46" r="6"/>
    <circle cx="430" cy="66" r="6"/><circle cx="450" cy="66" r="6"/><circle cx="470" cy="66" r="6"/>
  </g></svg>