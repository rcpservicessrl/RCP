<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" stroke-linecap="round" stroke-linejoin="round">
  <!-- Product Labels - Rounded rectangle with barcode lines at bottom -->
  <!-- Label body -->
  <rect x="96" y="96" width="320" height="320" rx="32" fill="#FCB53F" stroke="#000000" stroke-width="8"/>
  <!-- Inner white area -->
  <rect x="128" y="128" width="256" height="200" rx="16" fill="#FFFFFF" stroke="#000000" stroke-width="6"/>
  <!-- Logo area -->
  <circle cx="256" cy="192" r="32" fill="#A6CE39" stroke="#000000" stroke-width="6"/>
  <!-- Product name -->
  <rect x="184" y="244" width="144" height="16" rx="8" fill="#000000" stroke="none"/>
  <!-- Description line -->
  <rect x="168" y="276" width="176" height="12" rx="6" fill="#C48D65" stroke="none"/>
  <rect x="180" y="300" width="152" height="12" rx="6" fill="#C48D65" stroke="none"/>
  <!-- Barcode area -->
  <rect x="168" y="352" width="176" height="44" rx="8" fill="#FFFFFF" stroke="#000000" stroke-width="6"/>
  <!-- Barcode lines -->
  <rect x="184" y="360" width="4" height="28" fill="#000000" stroke="none"/>
  <rect x="192" y="360" width="2" height="28" fill="#000000" stroke="none"/>
  <rect x="198" y="360" width="6" height="28" fill="#000000" stroke="none"/>
  <rect x="208" y="360" width="3" height="28" fill="#000000" stroke="none"/>
  <rect x="215" y="360" width="5" height="28" fill="#000000" stroke="none"/>
  <rect x="224" y="360" width="2" height="28" fill="#000000" stroke="none"/>
  <rect x="230" y="360" width="6" height="28" fill="#000000" stroke="none"/>
  <rect x="240" y="360" width="3" height="28" fill="#000000" stroke="none"/>
  <rect x="248" y="360" width="5" height="28" fill="#000000" stroke="none"/>
  <rect x="257" y="360" width="2" height="28" fill="#000000" stroke="none"/>
  <rect x="263" y="360" width="6" height="28" fill="#000000" stroke="none"/>
  <rect x="273" y="360" width="4" height="28" fill="#000000" stroke="none"/>
  <rect x="281" y="360" width="2" height="28" fill="#000000" stroke="none"/>
  <rect x="287" y="360" width="5" height="28" fill="#000000" stroke="none"/>
  <rect x="296" y="360" width="3" height="28" fill="#000000" stroke="none"/>
  <rect x="303" y="360" width="6" height="28" fill="#000000" stroke="none"/>
  <rect x="313" y="360" width="2" height="28" fill="#000000" stroke="none"/>
  <rect x="319" y="360" width="4" height="28" fill="#000000" stroke="none"/>
  <rect x="327" y="360" width="5" height="28" fill="#000000" stroke="none"/>
  <!-- RCP signature: compact 2-by-3 gold dot matrix -->
  <g class="rcp-dot-matrix" aria-hidden="true" fill="#FCB53F">
    <circle cx="430" cy="46" r="6"/><circle cx="450" cy="46" r="6"/><circle cx="470" cy="46" r="6"/>
    <circle cx="430" cy="66" r="6"/><circle cx="450" cy="66" r="6"/><circle cx="470" cy="66" r="6"/>
  </g></svg>